<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

	<link rel="stylesheet" type="text/css" href="css/styles.css" />	    
	
	<title>Babylon Template</title>
	
	
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://code.jquery.com/pep/0.4.3/pep.js"></script>

	<script src="js/tabs.js"></script>
	<script src="js/viewer.js"></script>
	<script src="js/editor.js"></script>
	<!--
	<script src="js/data.js"></script>
	<script src="js/connections.js"></script>
	-->
  </head>

  <body>
  
		 <div class="tab">
			  <button class="tablinks" onclick="showTab(event, 'viewer_content')">Viewer</button>
			  <button class="tablinks" onclick="showTab(event, 'editor_content')">Editor</button>
			  <button class="tablinks" onclick="showTab(event, 'data_content')">Data</button>
			  <button class="tablinks" onclick="showTab(event, 'connections_content')">Connections</button>
		</div> 
		
		<div id="viewer_content", class="tabcontent">
			<canvas id="render_canvas" touch-action="none"></canvas>
			<!-- touch-action="none" for best results from PEP -->
		</div>
		
		<div id="editor_content", class="tabcontent">
			<label>Add .STL model to Scene</label><br>
			<input type="file", id="file_stl_selection" name="file_stl_selection" accept="stl">
		</div>		
		
  </body>
 
</html>
